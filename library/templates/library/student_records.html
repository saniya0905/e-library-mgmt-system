<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Records</title>

<style>

body{
background:#f4f7fb;
font-family:Arial,sans-serif;
}

nav{
background:#1e3a8a;
padding:20px 50px;
display:flex;
justify-content:space-between;
color:white;
}

.back-btn{
background:white;
padding:10px 20px;
border-radius:10px;
text-decoration:none;
color:#1e3a8a;
font-weight:bold;
}

.container{
padding:50px;
}

.container h1{
font-size:45px;
color:#1e3a8a;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

th{
background:#1e3a8a;
color:white;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#eef2ff;
}

footer{
background:#0f172a;
color:white;
padding:25px;
text-align:center;
margin-top:40px;
}

</style>
</head>

<body>

<nav>

<h2>Student Records</h2>

<a href="{% url 'dashboard' %}" class="back-btn">
Back
</a>

</nav>

<div class="container">

<h1>Registered Students</h1>

<p>
Track student registrations and monitor library usage records.
</p>

<table>

<tr>
<th>ID</th>
<th>Username</th>
<th>Email</th>
<th>Role</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student.user.id }}</td>
<td>{{ student.user.username }}</td>
<td>{{ student.user.email }}</td>
<td>{{ student.role }}</td>

</tr>

{% endfor %}

</table>

</div>

<footer>
© 2026 E-Library Hub
</footer>

</body>
</html>
